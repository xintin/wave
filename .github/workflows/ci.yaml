name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  # A PR number if a pull request and otherwise the commit hash. This cancels
  # queued and in-progress runs for the same PR (presubmit) or commit
  # (postsubmit). The workflow name is prepended to avoid conflicts between
  # different workflows.
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  test:
    name: "${{ matrix.name }} :: ${{ matrix.version }} :: Unit Tests and Type Checking"
    strategy:
      fail-fast: false
      matrix:
        name: [ubuntu-24.04]
        version: ["3.10", "3.11", "3.12", "3.13"]
        runs-on: [ubuntu-24.04]
        pytorch_requirements: ["pytorch-cpu-requirements.txt"]

        include:
          - name: linux-mi325
            version: "3.11"
            runs-on: linux-mi325-1gpu-ossci-iree-org
            pytorch_requirements: "pytorch-rocm-requirements.txt"
    runs-on: ${{matrix.runs-on}}
    timeout-minutes: 60
    env:
      VENV_DIR: ${{ github.workspace }}/.wave-venv
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setting up Rust"
        uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1.15.3
        with:
          toolchain: stable

      - name: "Install dwarfdump"
        run: |
          sudo apt-get update
          sudo apt-get install -y dwarfdump

      - name: "Setting up Python"
        id: setup_python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{matrix.version}}

      - name: Create Python venv
        run: |
          python -m venv ${VENV_DIR}
          source ${VENV_DIR}/bin/activate
          echo VIRTUAL_ENV=$VIRTUAL_ENV >> "$GITHUB_ENV"
          echo "$VENV_DIR/bin" >> "$GITHUB_PATH"

      - name: Install pip deps
        run: |
          python -m pip install --upgrade pip
          # Note: We install in three steps in order to satisfy requirements
          # from non default locations first. Additionally, installing
          # cpu/rocm-specific pytorch wheels first avoids installing
          # unnecessary libraries included in default pytorch.
          pip install --no-compile -r ${{ matrix.pytorch_requirements }}
          pip install --no-cache-dir -r requirements-iree-pinned.txt
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest -n 4 --capture=tee-sys -vv ./tests/unittests/
          pytest -n 4 --capture=tee-sys -vv ./tests/mlir_wave_iface

      - name: Run LIT tests
        run: |
          WAVE_TEST_DWARFDUMP=1 lit lit_tests/ -vv

      - name: MyPy Type Checking
        run: |
          mypy
